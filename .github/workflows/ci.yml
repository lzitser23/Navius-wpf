name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet build Navius.Wpf.sln -c Release
      - run: dotnet test tests/Navius.Wpf.Tests -c Release --no-build
      - run: dotnet test tests/Navius.Wpf.E2E -c Release --no-build
